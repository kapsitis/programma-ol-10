<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 430" font-family="'Trebuchet MS', Verdana, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333333"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1440" height="430" fill="#ffffff"/>

  <!-- edges -->
  <g fill="none" stroke="#333333" stroke-width="1.5">
    <!-- A -> B -->
    <path d="M216,215 L251,215" marker-end="url(#arrow)"/>
    <!-- B -> C -->
    <path d="M456,198 C480,185 476,132 494,112" marker-end="url(#arrow)"/>
    <!-- B -> T1 -->
    <path d="M456,232 C480,245 476,298 494,318" marker-end="url(#arrow)"/>
    <!-- A -> T2 -->
    <path d="M118,250 C118,402 690,408 833,374" marker-end="url(#arrow)"/>
    <!-- T1 -> T2 -->
    <path d="M696,335 L733,335" marker-end="url(#arrow)"/>
    <!-- T2 -> T3 -->
    <path d="M936,335 L973,335" marker-end="url(#arrow)"/>
    <!-- C -> T4 -->
    <path d="M696,78 C714,72 716,64 733,58" marker-end="url(#arrow)"/>
    <!-- C -> T5 -->
    <path d="M696,100 C900,132 1080,162 1212,196" marker-end="url(#arrow)"/>
    <!-- T3 -> T5 -->
    <path d="M1176,320 C1200,310 1198,252 1213,230" marker-end="url(#arrow)"/>
  </g>

  <!-- nodes -->
  <g stroke-width="1.5">
    <!-- A : yellow -->
    <rect x="20" y="180" width="196" height="70" rx="6" fill="#fff3cd" stroke="#b8860b"/>
    <!-- B : red -->
    <rect x="260" y="180" width="196" height="70" rx="6" fill="#f8d7da" stroke="#a94442"/>
    <!-- C : default -->
    <rect x="500" y="55" width="196" height="70" rx="6" fill="#ECECFF" stroke="#9370DB"/>
    <!-- T1 : red -->
    <rect x="500" y="300" width="196" height="70" rx="6" fill="#f8d7da" stroke="#a94442"/>
    <!-- T4 : default -->
    <rect x="740" y="20" width="196" height="70" rx="6" fill="#ECECFF" stroke="#9370DB"/>
    <!-- T2 : red -->
    <rect x="740" y="300" width="196" height="70" rx="6" fill="#f8d7da" stroke="#a94442"/>
    <!-- T3 : default -->
    <rect x="980" y="300" width="196" height="70" rx="6" fill="#ECECFF" stroke="#9370DB"/>
    <!-- T5 : default -->
    <rect x="1220" y="170" width="196" height="70" rx="6" fill="#ECECFF" stroke="#9370DB"/>
  </g>

  <!-- node labels -->
  <g fill="#333333" text-anchor="middle">
    <!-- A -->
    <text x="118" y="204">6. klase:</text>
    <text x="118" y="220">parasto daļu aritmētika</text>
    <text x="118" y="236">(M.6.3.2.1)</text>
    <!-- B -->
    <text x="358" y="204">9. klase:</text>
    <text x="358" y="220">polinomi, faktorizācijas</text>
    <text x="358" y="236">pamati (M.9.4.3.3)</text>
    <!-- C -->
    <text x="598" y="79">9. klase:</text>
    <text x="598" y="95">lineāri, kvadrātvienādojumi,</text>
    <text x="598" y="111">nevienādības (M.9.4.3.4)</text>
    <!-- T1 -->
    <text x="598" y="324">10. kl. 1. temats:</text>
    <text x="598" y="340">sadalīšana reizinātājos,</text>
    <text x="598" y="356">substitūcija</text>
    <!-- T4 -->
    <text x="838" y="51">10. kl. 4. temats:</text>
    <text x="838" y="67">vienādojumu sistēmas</text>
    <!-- T2 -->
    <text x="838" y="331">10. kl. 2. temats:</text>
    <text x="838" y="347">algebriskās daļas</text>
    <!-- T3 -->
    <text x="1078" y="331">10. kl. 3. temats:</text>
    <text x="1078" y="347">daļveida vienādojumi</text>
    <!-- T5 -->
    <text x="1318" y="201">10. kl. 5. temats:</text>
    <text x="1318" y="217">daļveida nevienādības</text>
  </g>
</svg>
